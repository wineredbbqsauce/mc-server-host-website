<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCPanel – Minecraft Server Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,0"
    />

    <!-- DIN CSS-FIL -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <div class="topbar-left">
          <div class="logo">
            <span
              class="material-symbols-outlined logo-icon"
              style="
                background: var(--green3);
                border-radius: 6px;
                padding: 4px;
                font-size: 14px;
              "
              >deployed_code</span
            >
            MCPanel
          </div>
          <div id="breadcrumb"></div>
        </div>
        <span class="material-symbols-outlined avatar" style="font-size: 20px"
          >account_circle</span
        >
      </div>

      <div id="body"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
